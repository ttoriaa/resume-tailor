name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check
        run: |
          python -m py_compile scripts/tailor_resume_for_jd.py scripts/resume_tailor_web.py

      - name: Basic startup test
        run: |
          python scripts/resume_tailor_web.py --host 127.0.0.1 --port 8787 &
          PID=$!
          sleep 2
          python - <<'PY'
          import urllib.request
          data = urllib.request.urlopen('http://127.0.0.1:8787', timeout=5).read().decode('utf-8')
          assert 'Resume Tailor Studio' in data
          print('startup-ok')
          PY
          kill $PID
